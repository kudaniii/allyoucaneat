<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Food Interactive</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>





<body class="bg-gradient-to-br from-green-400 via-yellow-300 to-orange-400 min-h-screen">

<audio id="bgm" loop></audio>
<!-- <audio id="clickSound" src="assets/audio/clicksound.mp3"></audio> -->

<div class="p-4 text-center text-white text-2xl font-bold bg-gradient-to-r from-green-500 to-lime-500 shadow-lg">
  <h1 class="animate-float">🍜 Food Interactive</h1>
</div>

<div class="text-center p-4 space-x-2">
  <button onclick="toggleMusic()" 
    class="bg-white text-green-600 px-4 py-2 rounded-full shadow hover:scale-110 transition">
    🎵 Music
  </button>

  <a href="pages/quiz.html" 
    class="bg-blue-500 text-white px-4 py-2 rounded-full shadow hover:scale-110 transition">
    🎮 Quiz
  </a>

  <a href="pages/add.html" 
   class="bg-purple-500 text-white px-4 py-2 rounded-full shadow hover:scale-110 transition">
   ➕ Tambah
</a>

</div>

<div class="text-center mb-4">
  <select onchange="changeMusic(this.value)" 
    class="px-4 py-2 rounded-full shadow text-green-700">
    <option value="suara background.mp3">🎵 Default</option>
    <option value="sbggame.mp3">🎮 Game</option>
    <option value="sbgdefault.mp3">🌿 Relax</option>
  </select>
</div>

<!-- volume -->
<div class="text-center mb-4">
  <label class="text-white">🔊 Volume</label><br>
  <input type="range" min="0" max="1" step="0.1" value="0.5"
    onchange="setVolume(this.value)">
</div>

<!-- mute -->
<div class="text-center mb-4">
  <button onclick="muteMusic()" 
    class="bg-red-500 text-white px-4 py-2 rounded-full shadow hover:scale-110 transition">
    🔇 Mute
  </button>
</div>



<div id="foodList" class="relative z-10 grid grid-cols-2 md:grid-cols-3 gap-4 p-4"></div>

<!-- MODAL -->
<div id="modal" 
class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">

  <div class="bg-white rounded-xl p-4 w-80 relative animate-scale">

    <img id="modalImg" 
    class="w-full h-40 object-cover rounded-lg mb-2">

    <h2 id="modalTitle" 
    class="text-lg font-bold text-green-700"></h2>

    <p id="modalDesc" 
    class="text-sm mt-1"></p>

    <button onclick="closeModal()" 
    class="absolute top-2 right-2 bg-red-500 text-white px-2 py-1 rounded">
      ✖
    </button>

  </div>
</div>

<!-- <script src="assets/js/data.js"></script> -->
<script src="assets/js/audio.js"></script>
<script src="assets/js/app.js"></script>

<style>
@keyframes scaleUp {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.animate-scale {
  animation: scaleUp 0.3s ease;
}
</style>

</body>
</html>
