<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<div class="text-center mb-4">
  <select onchange="changeMusic(this.value)" 
    class="px-4 py-2 rounded-full shadow text-purple-700">
    
    <option value="suara-background.mp3">🎵 Default</option>
    <option value="sbggame.mp3">🎮 Game</option>
    <option value="sbgdefault.mp3">🌿 Relax</option>

  </select>
  
</div>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-400 via-purple-400 to-pink-400 text-center p-4 min-h-screen">

<audio id="bgm" preload="none" loop></audio>

<h1 class="text-xl font-bold mb-4">🎮 Quiz Makanan</h1>

<img id="quizImg" class="w-60 mx-auto rounded">
<h2 id="question" class="mt-3 font-bold"></h2>

<div id="answers" class="mt-4 space-y-2"></div>

<p class="mt-4">Score: <span id="score">0</span></p>

<div class="mt-4 space-x-2">
  <button onclick="restartQuiz()" 
    class="bg-green-500 text-white px-4 py-2 rounded hover:scale-105 transition">
    🔁 Ulangi
  </button>

  <button onclick="goHome()" 
    class="bg-gray-500 text-white px-4 py-2 rounded hover:scale-105 transition">
    🏠 Menu Utama
  </button>
</div>

<!-- <script src="../assets/js/quizData.js"></script> -->
<script src="../assets/js/audio.js"></script>
<script src="../assets/js/quiz.js"></script>

</body>
</html>
